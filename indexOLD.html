<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<header>
    <h1>🎮 ARCADE HUB</h1>
    <p>Selecciona un juego</p>
</header>

<main class="games">

    <div class="card sans"
         onclick="abrirJuego('https://jcw87.github.io/c2-sans-fight/')">
        <div class="icon">💀</div>
        <h2>Sans Fight</h2>
        <p>Bad Time Simulator.</p>
    </div>

    <div class="card solitario"
         onclick="abrirJuego('solitario/')">
        <div class="icon">♠️</div>
        <h2>Solitario</h2>
        <p>Organiza las cartas y gana.</p>
    </div>

    <div class="card ajedrez"
         onclick="abrirJuego('ajedrez/')">
        <div class="icon">♚</div>
        <h2>Ajedrez</h2>
        <p>Planifica y derrota a tu rival.</p>
    </div>

    <div class="card mario"
         onclick="abrirJuego('https://jcw87.github.io/c2-smb1/')">
        <div class="icon">🍄</div>
        <h2>Mario</h2>
        <p>Super Mario Bros.</p>
    </div>

    <div class="card pokemon"
         onclick="abrirJuego('pokemon/pokemon_esmeralda.html')">

        <div class="icon">🦎</div>

        <h2>Pokémon Esmeralda</h2>

        <p>Game Boy Advance</p>

    </div>

</main>

<footer>
    <span id="version">v0.2</span>
</footer>

<script src="script.js"></script>

</body>
</html>
